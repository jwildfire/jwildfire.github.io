title: "Tech Stuff"
author: "Jeremy Wildfire"
description: "Blog for my work stuff" # This will show up in places like twitter, linkedin, etc, if you share your sites url as a post.

# Email / Social media user names used by the minima theme:
# All of these are optional and can be removed or commented out
email: "jwildfire@gmail.com"
twitter_username: "jwildfire"
github_username: "jwildfire"
linkedin_username: "jeremy-wildfire"

# Cloudflare Web Analytics beacon token (dash.cloudflare.com > Web Analytics >
# add site > copy the token from the JS snippet). Leave empty to disable.
cloudflare_web_analytics: "467f55bd2cc54185b9027ed877e09d22"


#########################################################################################
######### Nothing below needs to be changed (unless you know what you're doing) #########
#########################################################################################
theme: "minima"

rss: rss

kramdown:
  syntax_highlighter_opts:
    disable: true
    
plugins:
  - jekyll-feed
  - jekyll-sitemap

titles_from_headings:
  strip_title: true
  collections: true

defaults:
  - scope:
      path: ""
      type: post
    values:
      tags: Other
